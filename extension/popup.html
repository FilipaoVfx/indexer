<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>X Indexer</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: linear-gradient(180deg, #f6f8fc 0%, #eef2f8 100%);
        min-width: 360px;
      }

      main {
        padding: 14px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 16px;
      }

      p {
        margin: 0 0 12px;
        font-size: 12px;
        color: #364152;
      }

      .field {
        margin-bottom: 10px;
      }

      label {
        display: block;
        font-size: 11px;
        margin-bottom: 4px;
        color: #1f2937;
      }

      input {
        width: 100%;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        padding: 8px;
        font-size: 12px;
      }

      .row {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }

      button {
        flex: 1;
        border: 0;
        border-radius: 8px;
        padding: 9px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }

      #saveButton {
        background: #dbeafe;
        color: #1e3a8a;
      }

      #syncButton {
        background: #111827;
        color: #ffffff;
      }

      #flushButton {
        background: #e5e7eb;
        color: #111827;
      }

      #log {
        margin: 12px 0 0;
        border: 1px solid #dbe1ea;
        border-radius: 10px;
        background: #ffffff;
        min-height: 136px;
        max-height: 220px;
        overflow: auto;
        font-size: 11px;
        line-height: 1.45;
        padding: 10px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>X Bookmarks Indexer</h1>
      <p>Abre x.com/i/bookmarks y ejecuta la ingesta desde aqui.</p>

      <div class="field">
        <label for="apiBaseUrl">Backend URL</label>
        <input id="apiBaseUrl" placeholder="http://localhost:8787" />
      </div>

      <div class="field">
        <label for="userId">User ID</label>
        <input id="userId" placeholder="local-user" />
      </div>

      <div class="row">
        <button id="saveButton">Save</button>
        <button id="flushButton">Flush queue</button>
      </div>

      <div class="row">
        <button id="syncButton">Sync now</button>
      </div>

      <pre id="log"></pre>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
